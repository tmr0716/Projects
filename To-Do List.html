<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do List App</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#667eea,#764ba2);
    }

    .container{
      width:400px;
      background:white;
      padding:25px;
      border-radius:15px;
      box-shadow:0 5px 20px rgba(0,0,0,0.2);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#333;
    }

    .input-box{
      display:flex;
      gap:10px;
      margin-bottom:20px;
    }

    .input-box input{
      flex:1;
      padding:10px;
      border:2px solid #ddd;
      border-radius:8px;
      outline:none;
      font-size:16px;
    }

    .input-box button{
      padding:10px 15px;
      border:none;
      background:#667eea;
      color:white;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
      transition:0.3s;
    }

    .input-box button:hover{
      background:#5a67d8;
    }

    ul{
      list-style:none;
    }

    li{
      background:#f4f4f4;
      padding:12px;
      margin-bottom:10px;
      border-radius:8px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    li.completed span{
      text-decoration:line-through;
      color:gray;
    }

    .task-buttons button{
      margin-left:5px;
      border:none;
      padding:6px 10px;
      border-radius:5px;
      cursor:pointer;
      color:white;
    }

    .complete-btn{
      background:green;
    }

    .delete-btn{
      background:red;
    }

    .task-buttons button:hover{
      opacity:0.8;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>To-Do List</h1>

    <div class="input-box">
      <input type="text" id="taskInput" placeholder="Enter a task">
      <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

    function saveTasks() {
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function displayTasks() {
      const taskList = document.getElementById("taskList");
      taskList.innerHTML = "";

      tasks.forEach((task, index) => {
        const li = document.createElement("li");

        if(task.completed){
          li.classList.add("completed");
        }

        li.innerHTML = `
          <span>${task.text}</span>

          <div class="task-buttons">
            <button class="complete-btn" onclick="toggleTask(${index})">
              ✓
            </button>

            <button class="delete-btn" onclick="deleteTask(${index})">
              ✕
            </button>
          </div>
        `;

        taskList.appendChild(li);
      });
    }

    function addTask() {
      const taskInput = document.getElementById("taskInput");
      const text = taskInput.value.trim();

      if(text === ""){
        alert("Please enter a task!");
        return;
      }

      tasks.push({
        text:text,
        completed:false
      });

      saveTasks();
      displayTasks();

      taskInput.value = "";
    }

    function toggleTask(index){
      tasks[index].completed = !tasks[index].completed;

      saveTasks();
      displayTasks();
    }

    function deleteTask(index){
      tasks.splice(index,1);

      saveTasks();
      displayTasks();
    }

    displayTasks();
  </script>

</body>
</html>
